name: Deploy ctftime-sync worker

on:
  push:
    branches: [main]
    paths:
      - "workers/ctftime-sync/**"
      - ".github/workflows/deploy-ctftime-sync.yml"
  workflow_dispatch: # allow manual trigger

jobs:
  test:
    name: Local E2E tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        working-directory: workers/ctftime-sync
        run: npm test

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        working-directory: workers/ctftime-sync
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger initial sync
        run: |
          curl -sf "https://api.02labs.me/sync" \
            -o /dev/null \
            --retry 3 \
            --retry-delay 5 \
            && echo "Sync triggered successfully" \
            || echo "Sync trigger failed (non-fatal)"

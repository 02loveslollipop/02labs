name: Deploy www site

on:
  push:
    branches: [main]
    paths:
      - "apps/www/**"
      - ".github/workflows/deploy-www.yml"
  # Also re-deploy www whenever the sync worker changes (KV schema may evolve)
  workflow_run:
    workflows: ["Deploy ctftime-sync worker"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    # Skip if triggered by a failed ctftime-sync deploy
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        working-directory: apps/www
        run: npx astro build

      - name: Deploy worker
        working-directory: apps/www
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

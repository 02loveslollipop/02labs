<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e9e9e6"/>
    </linearGradient>
    <pattern id="p" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="#000" stroke-opacity="0.06" stroke-width="6"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#g)"/>

  <rect x="56" y="56" width="1088" height="788" rx="34" fill="none" stroke="#000" stroke-opacity="0.14" stroke-width="6"/>
  <rect x="88" y="88" width="1024" height="724" rx="28" fill="#fff" fill-opacity="0.5" stroke="#000" stroke-opacity="0.08" stroke-width="2"/>

  <text x="120" y="210" fill="#000" font-size="72" font-weight="850" font-family="Outfit, ui-sans-serif, system-ui, sans-serif" letter-spacing="-1.5">

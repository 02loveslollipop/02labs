  </text>

  <g transform="translate(120 340)" fill="none" stroke="#000" stroke-opacity="0.14">
    <rect x="0" y="0" width="420" height="280" rx="22" stroke-width="4"/>
    <rect x="28" y="34" width="110" height="110" rx="18" stroke-width="3"/>
    <rect x="160" y="44" width="220" height="18" rx="9" stroke-width="3"/>
    <rect x="160" y="78" width="180" height="14" rx="7" stroke-width="3"/>
    <rect x="28" y="168" width="352" height="14" rx="7" stroke-width="3"/>
    <rect x="28" y="198" width="312" height="14" rx="7" stroke-width="3"/>
    <rect x="28" y="228" width="260" height="14" rx="7" stroke-width="3"/>
  </g>

  <text x="120" y="780" fill="#000" opacity="0.55" font-size="18" font-weight="520" font-family="Outfit, ui-sans-serif, system-ui, sans-serif" letter-spacing="2">
    02LABS
